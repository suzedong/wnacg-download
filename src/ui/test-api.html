<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WNACG API 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      color: #333;
    }
    h1 {
      color: #667eea;
      text-align: center;
    }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .result {
      margin-top: 10px;
      padding: 10px;
      background: white;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .success {
      color: #28a745;
    }
    .error {
      color: #dc3545;
    }
    input {
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      margin: 5px;
      width: 200px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 WNACG API 测试</h1>
    
    <div class="test-section">
      <h3>1. 健康检查</h3>
      <button onclick="testHealth()">测试 /api/health</button>
      <div id="health-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>2. 获取配置</h3>
      <button onclick="testGetConfig()">测试 GET /api/config</button>
      <div id="config-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>3. 搜索漫画</h3>
      <input type="text" id="search-keyword" placeholder="输入作者名..." value="TYPE90" />
      <button onclick="testSearch()">测试 POST /api/search</button>
      <div id="search-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>4. 获取缓存列表</h3>
      <button onclick="testGetCache()">测试 GET /api/cache/list</button>
      <div id="cache-result" class="result"></div>
    </div>

    <div class="test-section">
      <h3>5. 对比漫画</h3>
      <input type="text" id="compare-keyword" placeholder="输入作者名..." value="TYPE90" />
      <input type="text" id="compare-path" placeholder="输入本地路径..." value="/tmp/comics" />
      <button onclick="testCompare()">测试 POST /api/compare</button>
      <div id="compare-result" class="result"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';

    async function testHealth() {
      const resultDiv = document.getElementById('health-result');
      try {
        resultDiv.innerHTML = '加载中...';
        const response = await fetch(`${API_BASE}/api/health`);
        const data = await response.json();
        resultDiv.innerHTML = `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
      } catch (error) {
        resultDiv.innerHTML = `<pre class="error">错误：${error.message}</pre>`;
      }
    }

    async function testGetConfig() {
      const resultDiv = document.getElementById('config-result');
      try {
        resultDiv.innerHTML = '加载中...';
        const response = await fetch(`${API_BASE}/api/config`);
        const data = await response.json();
        resultDiv.innerHTML = `<pre class="success">${JSON.stringify(data, null, 2)}</pre>`;
      } catch (error) {
        resultDiv.innerHTML = `<pre class="error">错误：${error.message}</pre>`;
      }
    }

    async function testSearch() {
      const resultDiv = document.getElementById('search-result');
      const keyword = document.getElementById('search-keyword').value;
      
      if (!keyword) {
        resultDiv.innerHTML = '<pre class="error">请输入关键字</pre>';
        return;
      }

      try {
        resultDiv.innerHTML = '搜索中...';
        const response = await fetch(`${API_BASE}/api/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, maxPages: 1, onlyChinese: true })
        });
        const data = await response.json();
        
        if (data.success) {
          resultDiv.innerHTML = `
            <pre class="success">${data.message}
找到 ${data.comics.length} 部漫画

前 5 部:
${data.comics.slice(0, 5).map(c => `- ${c.title}`).join('\n')}</pre>
          `;
        } else {
          resultDiv.innerHTML = `<pre class="error">错误：${data.error}</pre>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<pre class="error">错误：${error.message}</pre>`;
      }
    }

    async function testGetCache() {
      const resultDiv = document.getElementById('cache-result');
      try {
        resultDiv.innerHTML = '加载中...';
        const response = await fetch(`${API_BASE}/api/cache/list`);
        const data = await response.json();
        
        if (data.success) {
          resultDiv.innerHTML = `<pre class="success">缓存文件数：${data.files.length}

${data.files.map(f => `- ${f.keyword} (${f.comicCount}部漫画)`).join('\n')}</pre>`;
        } else {
          resultDiv.innerHTML = `<pre class="error">错误：${data.error}</pre>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<pre class="error">错误：${error.message}</pre>`;
      }
    }

    async function testCompare() {
      const resultDiv = document.getElementById('compare-result');
      const keyword = document.getElementById('compare-keyword').value;
      const localPath = document.getElementById('compare-path').value;
      
      if (!keyword || !localPath) {
        resultDiv.innerHTML = '<pre class="error">请输入关键字和路径</pre>';
        return;
      }

      try {
        resultDiv.innerHTML = '对比中...';
        const response = await fetch(`${API_BASE}/api/compare`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword, localPath })
        });
        const data = await response.json();
        
        if (data.success) {
          const result = data.result;
          resultDiv.innerHTML = `
            <pre class="success">对比结果:
网站漫画：${result.websiteComics.length}
本地漫画：${result.localComics.length}
需要下载：${result.toDownload.length}
已拥有：${result.alreadyHave.length}</pre>
          `;
        } else {
          resultDiv.innerHTML = `<pre class="error">错误：${data.error}</pre>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<pre class="error">错误：${error.message}</pre>`;
      }
    }
  </script>
</body>
</html>
