<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- 下载箭头 -->
  <g filter="url(#shadow)" transform="translate(256, 220)">
    <!-- 箭头主体 -->
    <path d="M-60,-80 L-60,40 L-100,40 L0,140 L100,40 L60,40 L60,-80 Z" fill="white" opacity="0.95"/>
    <!-- 下载托盘 -->
    <rect x="-120" y="160" width="240" height="24" rx="12" fill="white" opacity="0.95"/>
  </g>
  
  <!-- WN 文字标识 -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">WN</text>
</svg>
